<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Dashboard Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { padding: 20px; background-color: #f8f9fa; }
      .masuk { color: green; font-weight: bold; }
      .keluar { color: red; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="mb-4">Dashboard Pencatatan Keuangan</h2>
      
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>Tanggal</th>
                <th>Tipe</th>
                <th>Nominal</th>
                <th>Keterangan</th>
              </tr>
            </thead>
            <tbody id="dataTable">
              <tr><td colspan="4" class="text-center">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // Memanggil fungsi getTransactions dari Code.gs
      google.script.run.withSuccessHandler(showData).getTransactions();

      function showData(data) {
        var tbody = document.getElementById("dataTable");
        tbody.innerHTML = ""; 

        if (data.length <= 1) {
          tbody.innerHTML = "<tr><td colspan='4' class='text-center'>Belum ada transaksi.</td></tr>";
          return;
        }

        // Loop data dari baris terakhir ke pertama (kecuali header)
        for (var i = data.length - 1; i > 0; i--) {
          var row = data[i];
          var tr = document.createElement("tr");
          
          var tipeClass = row[1] === "Masuk" ? "masuk" : "keluar";
          
          tr.innerHTML = `
            <td>${row[0]}</td>
            <td class="${tipeClass}">${row[1]}</td>
            <td>Rp ${row[2]}</td>
            <td>${row[3]}</td>
          `;
          tbody.appendChild(tr);
        }
      }
    </script>
  </body>
</html>
